<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fdf3f8" />
    <script>
      // анти-флеш теми (до першого фарбу)
      (function(){try{var t=localStorage.getItem('kb_theme');
        if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme: dark)').matches))
          document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();
    </script>
    <title>K-Beauty Profi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,600;1,9..144,500&family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
